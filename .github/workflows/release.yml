name: Build & Release

# Déclenché quand vous poussez un tag de type v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # nécessaire pour créer la release GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifacts: dist/*.exe
          - os: macos-latest
            script: dist:mac
            artifacts: dist/*.dmg
          - os: ubuntu-latest
            script: dist:linux
            artifacts: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS uniquement — requis pour signer/notariser, ou simplement builder sans signature
      - name: Build (macOS — skip notarization)
        if: matrix.os == 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # pas de signature code, build simple

      - name: Build
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          draft: false
          generate_release_notes: true
